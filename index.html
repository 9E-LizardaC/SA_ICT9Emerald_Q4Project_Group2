<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login Page</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>

    body{
    background: linear-gradient(to bottom right, #020412, #071a3d, #000000);
    color: white;
    overflow-x: hidden;
    font-family: Arial, Helvetica, sans-serif;
}


  body::before{
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#4da6ff 1px, transparent 1px);
    background-size: 50px 50px, 100px 100px;
    opacity: 0.15;
    z-index: -1;
}


.sidebar a{
    color: #7ec8ff;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.sidebar a:hover{
    color: white;
    text-shadow: 0 0 10px #0d6efd;
}

.card{
    background: rgba(10, 20, 40, 0.85);
    border: 1px solid #0d6efd;
    color: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(13,110,253,0.4);
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 30px rgba(13,110,253,0.8);
}

.card-body{
    padding: 20px;
}

.card-title{
    font-weight: bold;
    color: #9fd3ff;
}

.card-img-top{
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.logo{
    border-radius: 50%;
    box-shadow: 0 0 20px #0d6efd;
}

h2{
    font-size: 3rem;
    font-weight: bold;
    color: #8cc8ff;
    text-shadow: 0 0 15px #0d6efd;
}

.subtitle{
    color: #b8dfff;
    font-size: 1.1rem;
}

.list-group-item{
    background: transparent;
    color: white;
    border-color: rgba(255,255,255,0.1);
}
</style>
</head>
<body>
  
<br><br><br><br>

<div class="main" style="text-align: center; display: flex; justify-content: center; align-items: center; min-height: 80vh; padding-left: 0 !important; padding-right: 0 !important;">
<div class="card mx-auto" style="max-width:60%; padding: 10%; border-radius: 20%;">

    <p>Welcome to Singularity Academy!</p>
    <p>Please log in to enter our galaxy!</p>
    <form>
        <label> Student ID </label>
        <input type="text" id="student_id" name="student_id" style="justify-content: center; align-items: center;">
        <br><br>
        <label> Password </label>   
        <input style="justify-content: center; align-items: center;" type="password" id="password" name="password"> <br><br>

        <button type="submit">Login</button>
    </form>
</div>
</div>

<script>
    
    const form = document.querySelector('form');
    const StudentID = document.getElementById('student_id');
    const Password = document.getElementById('password');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const StudentIDValue = document.getElementById('student_id').value;
        const PasswordValue = document.getElementById('password').value;

        if (!StudentIDValue || !PasswordValue) {
            alert('You are missing something!');
            return;
        }

        if (isNaN(StudentIDValue)) {
            alert('Check your Student ID!');
            return;
        }

        if (StudentIDValue.length !== 8) {
            alert('Student ID must be 8 digits!');
            return;
        }

        if (PasswordValue.length < 8) {
            alert('Password must be 8 characters or more!');
            return;
        }

        localStorage.setItem('student_id', StudentIDValue);
        localStorage.setItem('password', PasswordValue);

        window.location.href="home.html";
    });
</script>

</body>
</html>
