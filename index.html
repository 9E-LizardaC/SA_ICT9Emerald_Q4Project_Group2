<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login Page</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<style>
body{
    background: linear-gradient(to bottom right, #020412, #071a3d, #000000);
    color: white;
    overflow-x: hidden;
    font-family: Arial, Helvetica, sans-serif;
}

/* STAR BACKGROUND */
body::before{
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#4da6ff 1px, transparent 1px);
    background-size: 50px 50px, 100px 100px;
    opacity: 0.15;
    z-index: -1;
}

input[type="text"] {
	border: 2px solid #0d6efd;
    border-radius: 4px;
    background-color: #000000;
    color: white;
    outline: none;
    }
    
label {
	font-family:Helvetica, sans-serif;
    }
    
input[type="password"] {
	border: 2px solid #0d6efd;
    border-radius: 4px;
    background-color: #000000;
    color: white;
    outline: none;
    }

.card{
    background: rgba(10, 20, 40, 0.85);
    border: 1px solid #0d6efd;
    color: white;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(13,110,253,0.4);
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(13,110,253,0.7);
}

.card-header{
    background: rgba(13,110,253,0.2);
    border-bottom: 1px solid #0d6efd;
}



.btn-primary{
    background: linear-gradient(to right, #0d6efd, #3b82f6);
    border: none;
    border-radius: 12px;
}

.btn-primary:hover{
    background: linear-gradient(to right, #3b82f6, #60a5fa);
}

img{
    border-radius: 12px;
}

.logo{
    border-radius: 50%;
    box-shadow: 0 0 20px #0d6efd;
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    }
</style>
</head>
<style>
</style>
<body>
  
<br><br><br><br><br><br>

<div class="main" style="text-align: center;">
<div class="card mx-auto" style="max-width:60%; padding: 10%; border-radius: 20%;">

    <p>Welcome to Singularity Academy!</p>
    <p>Please log in to enter our galaxy!</p>
    <form>
        <label> Student ID </label>
        <input type="text" id="student_id" name="student_id" style="justify-content: center; align-items: center;">
        <br><br>
        <label> Password </label>   
        <input style="justify-content: center; align-items: center;" type="password" id="password" name="password"> <br><br>

        <button type="submit">Login</button>
    </form>
</div>
</div>

<script>
    
    const form = document.querySelector('form');
    const StudentID = document.getElementById('student_id');
    const Password = document.getElementById('password');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const StudentIDValue = document.getElementById('student_id').value;
        const PasswordValue = document.getElementById('password').value;

        if (!StudentIDValue || !PasswordValue) {
            alert('You are missing something!');
            return;
        }

        if (isNaN(StudentIDValue)) {
            alert('Check your Student ID!');
            return;
        }

        if (StudentIDValue.length !== 8) {
            alert('Student ID must be 8 digits!');
            return;
        }

        if (PasswordValue.length < 8) {
            alert('Password must be 8 characters or more!');
            return;
        }

        localStorage.setItem('student_id', StudentIDValue);
        localStorage.setItem('password', PasswordValue);

        window.location.href="index.html";
    });
</script>

</body>
</html>
