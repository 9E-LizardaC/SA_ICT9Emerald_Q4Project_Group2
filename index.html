<!DOCTYPE html>
<html lang="en">

<head>

  <title>Login Page</title>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top, rgba(13,110,253,0.2), transparent 35%),
    linear-gradient(to bottom right, #020412, #071a3d, #000000);
    color:white;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    position:relative;
}

/* STAR BACKGROUND */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#4da6ff 1px, transparent 1px);
    background-size:50px 50px, 100px 100px;
    opacity:0.15;
    z-index:-2;
}

/* GLOW */

body::after{
    content:"";
    position:fixed;
    top:-150px;
    right:-150px;
    width:450px;
    height:450px;
    background:radial-gradient(circle, rgba(13,110,253,0.25), transparent 70%);
    z-index:-3;
}

/* FLOATING ANIMATION */

@keyframes floatPlanet{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* MAIN */

.main{
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* LOGIN CARD */

.card{
    width:100%;
    max-width:500px;
    padding:50px;
    border-radius:35px !important;
    background:rgba(10,20,40,0.88);
    border:1px solid rgba(13,110,253,0.4);
    backdrop-filter:blur(12px);
    color:white;
    box-shadow:
    0 0 25px rgba(13,110,253,0.35),
    0 0 60px rgba(13,110,253,0.1);
    transition:0.35s ease;
}

.card:hover{
    transform:translateY(-8px) scale(1.01);
    box-shadow:
    0 0 35px rgba(13,110,253,0.7),
    0 0 80px rgba(13,110,253,0.2);
}

/* TITLE */

.title{
    font-size:2.5rem;
    font-weight:bold;
    color:#8cc8ff;
    text-shadow:
    0 0 15px #0d6efd,
    0 0 30px rgba(13,110,253,0.5);
    margin-bottom:10px;
}

/* SUBTITLE */

.subtitle{
    color:#b8dfff;
    margin-bottom:35px;
    font-size:1rem;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

label{
    text-align:left;
    color:#9fd3ff;
    font-weight:bold;
    margin-bottom:8px;
}

/* INPUTS */

input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 15px rgba(13,110,253,0.5);
    background:rgba(255,255,255,0.08);
}

/* BUTTON */

button{
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#0d6efd,#4da6ff);
    color:white;
    font-weight:bold;
    font-size:1rem;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(13,110,253,0.7);
}

/* FLOATING PLANETS */

.planet{
    position:absolute;
    border-radius:50%;
    filter:blur(1px);
    z-index:-1;
    animation:floatPlanet 6s ease-in-out infinite;
}

.planet1{
    width:180px;
    height:180px;
    background:radial-gradient(circle,#4da6ff,#0b1f4d);
    top:-50px;
    right:-50px;
    box-shadow:0 0 60px #0d6efd;
    animation-delay:0s;
}

.planet2{
    width:120px;
    height:120px;
    background:radial-gradient(circle,#6f42c1,#13082d);
    bottom:-40px;
    left:-30px;
    box-shadow:0 0 50px #6f42c1;
    animation-delay:2s;
}

/* MOBILE */

@media(max-width:768px){

    .card{
        padding:35px 25px;
    }

    .title{
        font-size:2rem;
    }

}

</style>

</head>

<body>

<!-- PLANETS -->

<div class="planet planet1"></div>

<div class="planet planet2"></div>

<!-- MAIN -->

<div class="main">

    <div class="card mx-auto">

        <h1 class="title">
            Singularity Academy
        </h1>

        <p class="subtitle">
            Please log in to enter our galaxy!
        </p>

        <form>

            <div>

                <label>
                    Student ID
                </label>

                <input
                type="text"
                id="student_id"
                name="student_id"
                placeholder="Enter your Student ID">

            </div>

            <div>

                <label>
                    Password
                </label>

                <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password">

            </div>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

<script>

const form = document.querySelector('form');

const StudentID = document.getElementById('student_id');

const Password = document.getElementById('password');

form.addEventListener('submit', (e) => {

    e.preventDefault();

    const StudentIDValue = document.getElementById('student_id').value;

    const PasswordValue = document.getElementById('password').value;

    if (!StudentIDValue || !PasswordValue){

        alert('You are missing something!');

        return;

    }

    if (isNaN(StudentIDValue)){

        alert('Check your Student ID!');

        return;

    }

    if (StudentIDValue.length !== 8){

        alert('Student ID must be 8 digits!');

        return;

    }

    if (PasswordValue.length < 8){

        alert('Password must be 8 characters or more!');

        return;

    }

    localStorage.setItem('student_id', StudentIDValue);

    localStorage.setItem('password', PasswordValue);

    window.location.href = "home.html";

});

</script>

</body>

</html>
