<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Profile | Singularity Academy</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
  radial-gradient(circle at top, rgba(13,110,253,0.25), transparent 30%),
  linear-gradient(to bottom right, #020412, #071a3d, #000000);
  font-family:'Poppins', sans-serif;
  color:white;
  overflow-x:hidden;
}

/* STAR BACKGROUND */

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
  radial-gradient(white 1px, transparent 1px),
  radial-gradient(#4da6ff 1px, transparent 1px);
  background-size:60px 60px, 120px 120px;
  opacity:0.15;
  z-index:-2;
  animation:starsMove 60s linear infinite;
}

@keyframes starsMove{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-200px);
  }
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:250px;
  height:100vh;
  background:rgba(7, 17, 35, 0.95);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:30px 20px;
  text-align:center;
  box-shadow:0 0 25px rgba(13,110,253,0.2);
}

.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 25px #0d6efd;
  border:3px solid rgba(255,255,255,0.1);
}

.sidebar-title{
  margin-top:15px;
  font-family:'Orbitron', sans-serif;
  color:#9fd3ff;
  font-size:1rem;
  letter-spacing:2px;
}

.sidebar a{
  display:block;
  color:#7ec8ff;
  text-decoration:none;
  margin:18px 0;
  font-weight:500;
  transition:0.3s;
  padding:10px;
  border-radius:12px;
}

.sidebar a:hover{
  background:rgba(13,110,253,0.2);
  color:white;
  transform:translateX(5px);
  box-shadow:0 0 15px rgba(13,110,253,0.3);
}

/* MAIN */

.main{
  margin-left:250px;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

/* CARD */

.profile-card{
  width:100%;
  max-width:700px;
  background:rgba(10, 20, 40, 0.88);
  border:1px solid rgba(126,200,255,0.2);
  border-radius:35px;
  padding:50px;
  backdrop-filter:blur(15px);
  box-shadow:
  0 0 25px rgba(13,110,253,0.25),
  0 0 60px rgba(13,110,253,0.12);
  text-align:center;
  animation:floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-8px);
  }
}

.profile-title{
  font-family:'Orbitron', sans-serif;
  font-size:2.4rem;
  color:#9fd3ff;
  text-shadow:0 0 12px #0d6efd;
  margin-bottom:10px;
}

.subtitle{
  color:#cfe8ff;
  margin-bottom:35px;
}

/* PROFILE PHOTO */

.profile-pic-container{
  position:relative;
  width:200px;
  margin:auto;
}

#pfp{
  width:200px;
  height:200px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(13,110,253,0.6);
  transition:0.3s;
}

#pfp:hover{
  transform:scale(1.03);
}

.glow-ring{
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:2px solid rgba(13,110,253,0.4);
  animation:rotateRing 10s linear infinite;
}

@keyframes rotateRing{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* BUTTON */

.upload-btn{
  margin-top:25px;
  padding:12px 24px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#0d6efd,#4da6ff);
  color:white;
  font-weight:bold;
  transition:0.3s;
}

.upload-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px #0d6efd;
}

/* INFO BOXES */

.info-box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:18px 22px;
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.info-box:hover{
  background:rgba(13,110,253,0.12);
  transform:translateY(-3px);
}

.info-label{
  color:#9fd3ff;
  font-weight:600;
}

.info-value{
  color:white;
  font-weight:400;
}

/* MOBILE */

@media(max-width:768px){

  .sidebar{
    position:relative;
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }

  .main{
    margin-left:0;
    padding:20px;
  }

  .profile-card{
    padding:35px 25px;
  }

  .profile-title{
    font-size:1.8rem;
  }

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <img src="Images/logo.png" class="logo">

  <div class="sidebar-title">
    SINGULARITY ACADEMY
  </div>

  <br><br>

  <a href="home.html">🏠 Home</a>

  <a href="tasks.html">📚 Tasks</a>

  <a href="vnlist.html">📓 Virtual Notebooks</a>

  <a href="profile.html">👨‍🚀 Profile</a>

  <br><br><br>

  <a href="index.html">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

  <div class="profile-card">

    <h1 class="profile-title">
      Student Profile
    </h1>

    <p class="subtitle">
      Manage your academy credentials.
    </p>

    <!-- PROFILE PHOTO -->

    <div class="profile-pic-container">

      <div class="glow-ring"></div>

      <img
      src="placeholder_profile.png"
      id="pfp">

    </div>

    <input type="file" id="userfile" hidden>

    <button
    class="upload-btn"
    onclick="document.getElementById('userfile').click();">

      Upload New Photo

    </button>

    <!-- INFO -->

    <div class="info-box">

      <span class="info-label">
        Student ID
      </span>

      <span class="info-value" id="student_id"></span>

    </div>

    <div class="info-box">

      <span class="info-label">
        Password
      </span>

      <span class="info-value" id="password"></span>

    </div>

  </div>

</div>

<script>

const StudentID = localStorage.getItem('student_id');
const Password = localStorage.getItem('password');

document.getElementById('student_id').textContent = StudentID;
document.getElementById('password').textContent = Password;

/* PROFILE IMAGE */

const userfile = document.getElementById('userfile');
const pfp = document.getElementById('pfp');

userfile.addEventListener('change', () => {

  const newpfp = userfile.files[0];

  if(!newpfp) return;

  const url = URL.createObjectURL(newpfp);

  pfp.src = url;

});

</script>

</body>
</html>
